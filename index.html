<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=0">
    <meta name="theme-color" content="#09090b">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Countdowns">
    <title>Countdowns PWA</title>
    
    <!-- Canvas Confetti -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Tailwind Config for Shadcn aesthetic -->
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'system-ui', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'Helvetica Neue', 'Arial', 'sans-serif'],
                    },
                    animation: {
                        'tick': 'tick 0.25s cubic-bezier(0.4, 0, 0.2, 1)',
                        'in': 'fadeIn 0.2s ease-out',
                        'glow-pulse': 'glowPulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    },
                    keyframes: {
                        tick: {
                            '0%': { transform: 'scale(0.9)', opacity: '0.7' },
                            '100%': { transform: 'scale(1)', opacity: '1' },
                        },
                        fadeIn: {
                            '0%': { opacity: '0', transform: 'scale(0.95)' },
                            '100%': { opacity: '1', transform: 'scale(1)' },
                        },
                        glowPulse: {
                            '0%, 100%': { opacity: '1' },
                            '50%': { opacity: '0.6', transform: 'scale(1.01)' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap');
        
        :root {
            color-scheme: dark;
        }

        body {
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        
        /* Hide scrollbar for cleaner mobile feel */
        ::-webkit-scrollbar {
            width: 0px;
            background: transparent;
        }

        /* Modal backdrop blur transition */
        dialog::backdrop {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
        }
    </style>
</head>
<body class="bg-zinc-950 bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-zinc-900 via-zinc-950 to-zinc-950 text-zinc-50 min-h-screen select-none antialiased selection:bg-zinc-800">
    
    <!-- Sticky Header Wrapper -->
    <div class="sticky top-0 z-50 px-4 sm:px-6 pt-4 sm:pt-8 pb-4 bg-zinc-950/80 backdrop-blur-xl border-b border-white/5 mb-6 sm:mb-8 transition-all">
        <header class="max-w-2xl mx-auto flex items-end justify-between">
            <div>
                <h1 class="text-3xl sm:text-4xl font-black tracking-tighter text-white drop-shadow-sm">Countdowns.</h1>
                <p class="text-sm font-medium tracking-wide text-zinc-400 mt-1">Track your upcoming events</p>
            </div>
            
            <div class="flex items-center gap-3">
                <div id="pwa-status" class="hidden items-center justify-center rounded-full bg-zinc-800/80 ring-1 ring-white/10 backdrop-blur-sm px-4 py-1.5 text-xs font-bold tracking-wide text-zinc-300 shadow-sm">
                    Ready
                </div>
                <!-- Add Button -->
                <button onclick="document.getElementById('add-modal').showModal()" class="flex items-center justify-center h-10 w-10 rounded-full bg-white text-zinc-950 hover:bg-zinc-200 transition-colors shadow-lg shadow-white/10 ring-1 ring-white/20 active:scale-95">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"></path></svg>
                </button>
            </div>
        </header>
    </div>

    <div class="max-w-2xl mx-auto p-4 sm:p-6 pb-20 pt-0 safe-area-pt">
        <main id="countdowns-container" class="space-y-6 sm:space-y-8 flex flex-col">
            <!-- Cards will be injected here -->
        </main>
    </div>

    <!-- Glassmorphism Add Modal -->
    <dialog id="add-modal" class="bg-transparent p-0 m-auto backdrop:bg-black/60 backdrop:backdrop-blur-sm animate-in w-full max-w-md">
        <div class="bg-zinc-900/95 border border-white/10 shadow-2xl rounded-3xl p-6 m-4 backdrop-blur-xl text-zinc-50 max-h-[90vh] overflow-y-auto">
            <h3 class="text-xl font-bold tracking-tight mb-4">New Countdown</h3>
            <form id="add-form" class="space-y-4">
                <div class="flex gap-4">
                    <div class="w-24">
                        <label class="block text-xs font-bold uppercase tracking-wider text-zinc-400 mb-1.5">Emoji</label>
                        <input type="text" id="event-emoji" required value="✨" maxlength="2" class="w-full text-center bg-zinc-950/50 border border-white/10 rounded-xl px-2 py-3 text-2xl focus:outline-none focus:ring-2 focus:ring-zinc-500 transition-all">
                    </div>
                    <div class="flex-1">
                        <label class="block text-xs font-bold uppercase tracking-wider text-zinc-400 mb-1.5">Event Title</label>
                        <input type="text" id="event-title" required placeholder="e.g., Summer Vacation" class="w-full bg-zinc-950/50 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-zinc-600 focus:outline-none focus:ring-2 focus:ring-zinc-500 transition-all">
                    </div>
                </div>
                
                <div>
                    <label class="block text-xs font-bold uppercase tracking-wider text-zinc-400 mb-2">Color Theme</label>
                    <div class="flex gap-3">
                        <label class="cursor-pointer">
                            <input type="radio" name="event-theme" value="zinc" class="peer sr-only" checked>
                            <div class="w-8 h-8 rounded-full bg-zinc-500 ring-2 ring-offset-2 ring-offset-zinc-900 ring-transparent peer-checked:ring-zinc-400 transition-all"></div>
                        </label>
                        <label class="cursor-pointer">
                            <input type="radio" name="event-theme" value="indigo" class="peer sr-only">
                            <div class="w-8 h-8 rounded-full bg-indigo-500 ring-2 ring-offset-2 ring-offset-zinc-900 ring-transparent peer-checked:ring-indigo-400 transition-all"></div>
                        </label>
                        <label class="cursor-pointer">
                            <input type="radio" name="event-theme" value="rose" class="peer sr-only">
                            <div class="w-8 h-8 rounded-full bg-rose-500 ring-2 ring-offset-2 ring-offset-zinc-900 ring-transparent peer-checked:ring-rose-400 transition-all"></div>
                        </label>
                        <label class="cursor-pointer">
                            <input type="radio" name="event-theme" value="emerald" class="peer sr-only">
                            <div class="w-8 h-8 rounded-full bg-emerald-500 ring-2 ring-offset-2 ring-offset-zinc-900 ring-transparent peer-checked:ring-emerald-400 transition-all"></div>
                        </label>
                        <label class="cursor-pointer">
                            <input type="radio" name="event-theme" value="amber" class="peer sr-only">
                            <div class="w-8 h-8 rounded-full bg-amber-500 ring-2 ring-offset-2 ring-offset-zinc-900 ring-transparent peer-checked:ring-amber-400 transition-all"></div>
                        </label>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold uppercase tracking-wider text-zinc-400 mb-1.5">Date</label>
                        <input type="date" id="event-date" required class="w-full bg-zinc-950/50 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-zinc-500 transition-all [color-scheme:dark]">
                    </div>
                    <div>
                        <label class="block text-xs font-bold uppercase tracking-wider text-zinc-400 mb-1.5">Time</label>
                        <input type="time" id="event-time" value="00:00" required class="w-full bg-zinc-950/50 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-zinc-500 transition-all [color-scheme:dark]">
                    </div>
                </div>
                <div class="flex gap-3 pt-4 mt-6 border-t border-white/10">
                    <button type="button" onclick="document.getElementById('add-modal').close()" class="flex-1 py-3 rounded-xl font-semibold text-zinc-300 bg-zinc-800/50 hover:bg-zinc-800 transition-colors">Cancel</button>
                    <button type="submit" class="flex-1 py-3 rounded-xl font-bold text-zinc-950 bg-white hover:bg-zinc-200 shadow-[0_0_15px_rgba(255,255,255,0.2)] transition-colors">Save Event</button>
                </div>
            </form>
        </div>
    </dialog>

    <script>
        // --- SECURITY / UTILITIES ---
        // Prevents Cross-Site Scripting (XSS) from malicious URL injections or local storage edits
        function escapeHTML(str) {
            if (!str) return '';
            return str.toString().replace(/[&<>'"]/g, 
                tag => ({
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    "'": '&#39;',
                    '"': '&quot;'
                }[tag] || tag)
            );
        }

        // --- THEMES MAP ---
        const themeMap = {
            zinc:   { border: 'border-white/5 hover:border-white/10 shadow-xl shadow-black/40', textPrimary: 'text-white', textSecondary: 'text-zinc-400', textLabel: 'text-zinc-500', bar: 'bg-zinc-400' },
            indigo: { border: 'border-indigo-500/30 hover:border-indigo-500/50 shadow-[0_0_30px_rgba(79,70,229,0.15)]', textPrimary: 'text-indigo-50', textSecondary: 'text-indigo-200/80', textLabel: 'text-indigo-400/70', bar: 'bg-indigo-500' },
            rose:   { border: 'border-rose-500/30 hover:border-rose-500/50 shadow-[0_0_30px_rgba(244,63,94,0.15)]', textPrimary: 'text-rose-50', textSecondary: 'text-rose-200/80', textLabel: 'text-rose-400/70', bar: 'bg-rose-500' },
            emerald:{ border: 'border-emerald-500/30 hover:border-emerald-500/50 shadow-[0_0_30px_rgba(16,185,129,0.15)]', textPrimary: 'text-emerald-50', textSecondary: 'text-emerald-200/80', textLabel: 'text-emerald-400/70', bar: 'bg-emerald-500' },
            amber:  { border: 'border-amber-500/30 hover:border-amber-500/50 shadow-[0_0_30px_rgba(245,158,11,0.15)]', textPrimary: 'text-amber-50', textSecondary: 'text-amber-200/80', textLabel: 'text-amber-400/70', bar: 'bg-amber-500' }
        };

        // --- INTERACTIVE STATE & STORAGE ---
        const defaultData = [
          { "title": "Barcelona Trip", "date": "2026-06-01T00:00:00", "id": "default-1", "emoji": "🇪🇸", "theme": "rose", "created": new Date().toISOString() },
          { "title": "Bangkok Bound", "date": "2026-06-05T00:00:00", "id": "default-2", "emoji": "🇹🇭", "theme": "amber", "created": new Date().toISOString() }
        ];

        let countdownData = [];
        const savedData = JSON.parse(localStorage.getItem('countdownsData'));

        if (savedData && Array.isArray(savedData)) {
            // Load saved data and safely auto-fix legacy items lacking new features
            countdownData = savedData.map(item => {
                if (!item.id) item.id = 'legacy-' + Math.random().toString(36).substr(2, 9);
                if (!item.emoji) item.emoji = "🗓️";
                if (!item.theme) item.theme = "zinc";
                if (!item.created) {
                    const parsedTime = new Date(item.date).getTime();
                    // Prevent RangeError if date string from legacy was unparsable
                    item.created = isNaN(parsedTime) 
                        ? new Date().toISOString() 
                        : new Date(parsedTime - (1000 * 60 * 60 * 24 * 30)).toISOString();
                }
                return item;
            });
        } else {
            countdownData = [...defaultData];
        }

        saveData();

        function saveData() {
            localStorage.setItem('countdownsData', JSON.stringify(countdownData));
        }

        // --- URL PARAMETER PARSING (With Auto-Save) ---
        const urlParams = new URLSearchParams(window.location.search);
        let queryDate = urlParams.get('date');
        const queryTitle = urlParams.get('title') || "Target Date";

        function parseCustomDateString(dateStr) {
            if (!dateStr) return null;
            const match = dateStr.trim().match(/^(\d{1,2})\s*([a-zA-Z]+)$/);
            if (!match) return null;

            const day = parseInt(match[1], 10);
            const monthStr = match[2].toLowerCase();
            const months = ["jan", "feb", "mar", "apr", "may", "jun", "jul", "aug", "sep", "oct", "nov", "dec"];
            const monthIndex = months.findIndex(m => monthStr.startsWith(m));

            if (monthIndex === -1) return null;

            const now = new Date();
            let targetYear = now.getFullYear();
            let targetDate = new Date(targetYear, monthIndex, day);

            if (targetDate.getMonth() !== monthIndex) return null;
            if (targetDate.getTime() < now.getTime()) targetDate.setFullYear(targetYear + 1);

            return targetDate.toISOString();
        }

        if (queryDate) {
            const customDate = parseCustomDateString(queryDate);
            if (customDate) queryDate = customDate;

            if (!isNaN(Date.parse(queryDate))) {
                const exists = countdownData.some(d => d.title === queryTitle && new Date(d.date).getTime() === new Date(queryDate).getTime());
                
                if (!exists) {
                    countdownData.push({
                        "id": Date.now().toString(),
                        "title": queryTitle, // Will be sanitized in renderInitialUI
                        "date": queryDate,
                        "isPrimary": true,
                        "emoji": "🌟",
                        "theme": "indigo",
                        "created": new Date().toISOString()
                    });
                    saveData();
                    window.history.replaceState({}, document.title, window.location.pathname);
                }
            }
        }

        // --- AUTO-SORTING ---
        function sortData() {
            countdownData.sort((a, b) => new Date(a.date).getTime() - new Date(b.date).getTime());
        }

        // --- DYNAMIC PWA SETUP (Manifest Only) ---
        function setupPWA() {
            const svgIcon = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="#ffffff"><path d="M256 8C119 8 8 119 8 256s111 248 248 248 248-111 248-248S393 8 256 8zm0 448c-110.5 0-200-89.5-200-200S145.5 56 256 56s200 89.5 200 200-89.5 200-200 200zm61.8-104.4l-84.9-61.7c-3.1-2.3-4.9-5.9-4.9-9.7V116c0-6.6 5.4-12 12-12h32c6.6 0 12 5.4 12 12v141.7l66.8 48.6c5.4 3.9 6.5 11.4 2.6 16.8L334.6 349c-3.9 5.3-11.4 6.5-16.8 2.6z"/></svg>`;
            const iconUrl = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svgIcon);

            const manifest = {
                name: "Countdowns",
                short_name: "Countdowns",
                description: "A minimal progressive web app for tracking countdowns.",
                start_url: window.location.pathname,
                display: "standalone",
                background_color: "#09090b",
                theme_color: "#09090b",
                icons: [ { src: iconUrl, sizes: "192x192 512x512", type: "image/svg+xml", purpose: "any maskable" } ]
            };

            const manifestDataUrl = 'data:application/json;charset=utf-8,' + encodeURIComponent(JSON.stringify(manifest));
            const link = document.createElement('link');
            link.rel = 'manifest';
            link.href = manifestDataUrl;
            document.head.appendChild(link);
            
            const statusBadge = document.getElementById('pwa-status');
            statusBadge.classList.remove('hidden');
            statusBadge.classList.add('flex');
        }

        // --- UI & COUNTDOWN LOGIC ---
        const container = document.getElementById('countdowns-container');

        function formatDate(dateStr) {
            const options = { weekday: 'short', year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' };
            const parsedDate = new Date(dateStr);
            return isNaN(parsedDate) ? 'Invalid Date' : parsedDate.toLocaleDateString(undefined, options);
        }

        // Action Handlers
        window.deleteEvent = function(id) {
            if(confirm("Are you sure you want to remove this countdown?")) {
                countdownData = countdownData.filter(item => item.id !== id);
                saveData();
                renderInitialUI();
                updateTimers();
            }
        };

        window.shareEvent = async function(id) {
            const item = countdownData.find(i => i.id === id);
            if (!item) return;
            
            const shareUrl = `${window.location.origin}${window.location.pathname}?title=${encodeURIComponent(item.title)}&date=${encodeURIComponent(item.date)}`;
            const shareData = { title: item.title, text: `Countdown to ${item.title}!`, url: shareUrl };

            if (navigator.share && navigator.canShare(shareData)) {
                try { await navigator.share(shareData); } catch (err) { console.log("Share cancelled"); }
            } else {
                navigator.clipboard.writeText(shareUrl);
                alert("Share link copied to clipboard!");
            }
        };

        function renderInitialUI() {
            sortData(); 
            
            if (countdownData.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-20 px-6 border border-white/5 rounded-3xl bg-zinc-900/30 backdrop-blur-sm">
                        <div class="w-16 h-16 mx-auto mb-4 bg-zinc-800/80 rounded-full flex items-center justify-center text-zinc-500">
                            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        </div>
                        <h3 class="text-xl font-bold text-white mb-2">No Countdowns</h3>
                        <p class="text-zinc-500 text-sm">Add an event using the + button above to get started.</p>
                    </div>`;
                return;
            }

            container.innerHTML = countdownData.map((item, index) => {
                const isPrimary = item.isPrimary;
                const theme = themeMap[item.theme] || themeMap.zinc;
                
                // CRITICAL FIX: Escape HTML to prevent Reflected XSS from URL parameters or local storage tampering
                const safeEmoji = escapeHTML(item.emoji || "🗓️");
                const safeTitle = escapeHTML(item.title);
                
                const cardBorder = `${theme.border} bg-zinc-900/80`;
                const dayColor = theme.textPrimary;
                const otherColor = theme.textSecondary;
                const labelColor = theme.textLabel;
                
                const badge = isPrimary 
                    ? `<div class="inline-flex items-center gap-2 rounded-full bg-indigo-500/10 px-3 py-1 mb-4 border border-indigo-500/20 w-fit">
                         <span class="relative flex h-2 w-2">
                           <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-indigo-400 opacity-75"></span>
                           <span class="relative inline-flex rounded-full h-2 w-2 bg-indigo-500"></span>
                         </span>
                         <span class="text-[10px] font-bold text-indigo-300 uppercase tracking-widest">Shared Event</span>
                       </div>`
                    : '';

                return `
                    <div id="card-${index}" class="group relative flex flex-col rounded-3xl border backdrop-blur-md p-6 sm:p-8 transition-all duration-300 overflow-hidden ${cardBorder}">
                        ${isPrimary ? `<div class="absolute top-0 left-0 w-full h-1 ${theme.bar}"></div>` : ''}
                        
                        <!-- Top Actions -->
                        <div class="absolute top-6 right-6 flex items-center gap-2 opacity-100 sm:opacity-0 sm:group-hover:opacity-100 transition-opacity z-10">
                            <button onclick="shareEvent('${item.id}')" class="p-2 bg-zinc-800/80 hover:bg-zinc-700 rounded-full text-zinc-300 transition-colors border border-white/5">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"></path></svg>
                            </button>
                            <button onclick="deleteEvent('${item.id}')" class="p-2 bg-zinc-800/80 hover:bg-red-500/20 rounded-full text-zinc-300 hover:text-red-400 transition-colors border border-white/5">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                            </button>
                        </div>

                        ${badge}
                        
                        <div class="flex items-center gap-4 mb-2 pr-20">
                            <span class="text-3xl sm:text-4xl drop-shadow-md bg-white/5 rounded-xl p-2 border border-white/5">${safeEmoji}</span>
                            <h2 class="text-2xl sm:text-3xl font-bold tracking-tight text-zinc-100">${safeTitle}</h2>
                        </div>
                        
                        <p class="text-sm font-medium text-zinc-400 mb-8 flex items-center gap-2">
                            <svg class="w-4 h-4 text-zinc-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                            ${formatDate(item.date)}
                        </p>
                        
                        <div id="status-${index}" class="hidden w-full bg-emerald-500/10 rounded-2xl py-6 mt-2 text-center border border-emerald-500/20 backdrop-blur-sm mb-2">
                            <span class="text-sm font-bold uppercase tracking-widest text-emerald-400 flex items-center justify-center gap-2">
                                <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                                Event Reached
                            </span>
                        </div>

                        <div id="grid-${index}" class="flex flex-col sm:flex-row sm:items-end gap-6 sm:gap-8 mt-2 mb-4">
                            <div class="flex flex-col">
                                <span class="text-[10px] sm:text-xs font-bold ${labelColor} uppercase tracking-[0.2em] mb-1">Days</span>
                                <span id="val-${index}-Days" class="text-6xl sm:text-7xl font-black ${dayColor} tabular-nums tracking-tighter leading-none inline-block drop-shadow-md">0</span>
                            </div>
                            
                            <div class="hidden sm:block w-px h-12 bg-white/10 mb-1"></div>

                            <div class="flex gap-5 sm:gap-6">
                                <div class="flex flex-col">
                                    <span class="text-[10px] sm:text-xs font-bold ${labelColor} uppercase tracking-[0.2em] mb-1">Hours</span>
                                    <span id="val-${index}-Hours" class="text-3xl sm:text-4xl font-bold ${otherColor} tabular-nums tracking-tighter leading-none inline-block">00</span>
                                </div>
                                <div class="flex flex-col">
                                    <span class="text-[10px] sm:text-xs font-bold ${labelColor} uppercase tracking-[0.2em] mb-1">Mins</span>
                                    <span id="val-${index}-Mins" class="text-3xl sm:text-4xl font-bold ${otherColor} tabular-nums tracking-tighter leading-none inline-block">00</span>
                                </div>
                                <div class="flex flex-col">
                                    <span class="text-[10px] sm:text-xs font-bold ${labelColor} uppercase tracking-[0.2em] mb-1">Secs</span>
                                    <span id="val-${index}-Secs" class="text-3xl sm:text-4xl font-bold ${otherColor} tabular-nums tracking-tighter leading-none inline-block">00</span>
                                </div>
                            </div>
                        </div>

                        <!-- Progress Bar -->
                        <div class="absolute bottom-0 left-0 w-full h-1.5 bg-black/40">
                            <div id="progress-${index}" class="h-full ${theme.bar} transition-all duration-1000 ease-linear shadow-[0_0_10px_rgba(255,255,255,0.2)]" style="width: 0%"></div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Helper to update text with CSS Animation
        function updateAnimatedText(elementId, newValue) {
            const el = document.getElementById(elementId);
            if (!el) return;
            const currentVal = el.textContent;
            if (currentVal !== newValue.toString()) {
                el.textContent = newValue;
                // Retrigger animation
                el.classList.remove('animate-tick');
                void el.offsetWidth; // trigger reflow
                el.classList.add('animate-tick');
            }
        }

        function updateTimers() {
            const now = new Date().getTime();

            countdownData.forEach((item, index) => {
                const target = new Date(item.date).getTime();
                const diff = target - now;

                const statusEl = document.getElementById(`status-${index}`);
                const gridEl = document.getElementById(`grid-${index}`);
                const cardEl = document.getElementById(`card-${index}`);
                const progressEl = document.getElementById(`progress-${index}`);

                if (!statusEl || !gridEl) return;

                if (diff <= 0) {
                    statusEl.classList.remove('hidden');
                    gridEl.classList.add('hidden');
                    if (progressEl) progressEl.style.width = '100%';
                    
                    // Trigger Confetti Once
                    if (!item.confettiFired) {
                        if (typeof confetti !== 'undefined') confetti({ particleCount: 120, spread: 80, origin: { y: 0.6 } });
                        item.confettiFired = true; 
                    }
                    return;
                } else {
                    statusEl.classList.add('hidden');
                    gridEl.classList.remove('hidden');
                }

                // Urgency State (< 24h)
                if (diff < 86400000) {
                    if (cardEl && !cardEl.classList.contains('animate-glow-pulse')) {
                        cardEl.classList.add('animate-glow-pulse');
                    }
                } else {
                    if (cardEl) cardEl.classList.remove('animate-glow-pulse');
                }

                // Progress Bar Calc - FIX: Prevent Division by zero (NaN evaluation)
                if (progressEl) {
                    const createdTime = item.created ? new Date(item.created).getTime() : (target - (1000 * 60 * 60 * 24 * 30));
                    const total = target - createdTime;
                    const elapsed = now - createdTime;
                    
                    let percent = 100;
                    if (total > 0) {
                        percent = Math.max(0, Math.min(100, (elapsed / total) * 100));
                    }
                    progressEl.style.width = `${percent}%`;
                }

                const days = Math.floor(diff / (1000 * 60 * 60 * 24));
                const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const mins = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                const secs = Math.floor((diff % (1000 * 60)) / 1000);

                updateAnimatedText(`val-${index}-Days`, days);
                updateAnimatedText(`val-${index}-Hours`, hours.toString().padStart(2, '0'));
                updateAnimatedText(`val-${index}-Mins`, mins.toString().padStart(2, '0'));
                updateAnimatedText(`val-${index}-Secs`, secs.toString().padStart(2, '0'));
            });
        }

        // Handle Add Form Submission
        document.getElementById('add-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const emoji = document.getElementById('event-emoji').value;
            const title = document.getElementById('event-title').value;
            const theme = document.querySelector('input[name="event-theme"]:checked').value;
            const dateStr = document.getElementById('event-date').value;
            const timeStr = document.getElementById('event-time').value;
            
            // Combine date and time
            const fullDate = `${dateStr}T${timeStr}:00`;

            // CRITICAL FIX: Validate date so it doesn't break Math calculations internally
            if (isNaN(new Date(fullDate).getTime())) {
                alert("Please enter a valid date and time.");
                return;
            }
            
            countdownData.push({
                id: Date.now().toString(),
                emoji: emoji,
                title: title,
                theme: theme,
                date: fullDate,
                created: new Date().toISOString(),
                isPrimary: false
            });
            
            saveData();
            document.getElementById('add-modal').close();
            this.reset();
            
            renderInitialUI();
            updateTimers();
        });

        // --- INITIALIZATION ---
        setupPWA();
        renderInitialUI();
        updateTimers(); // Run once immediately
        setInterval(updateTimers, 1000);

    </script>
</body>
</html>
